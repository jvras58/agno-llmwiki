services:
  # Banco de dados com suporte a Vetores (pgvector)
  db:
    image: ankane/pgvector:latest
    container_name: nexus_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_NAME:-ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Servidor LLM local (Ollama) docker compose exec ollama ollama pull llama3
  ollama:
    image: ollama/ollama:latest
    container_name: nexus_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # API Principal do Nexus
  api:
    build: .
    container_name: nexus_api
    command: python -m app.main
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ${VAULT_PATH}:/app/vault
    environment:
      - DB_URL_VECTORDB=${DB_URL_VECTORDB:-postgresql+psycopg://ai:ai@db:5432/ai}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}

  # Worker que vigia as mudanças no Obsidian
  watcher:
    build: .
    container_name: nexus_watcher
    command: python -m app.workers.vault_watcher
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    env_file: .env
    volumes:
      - ${VAULT_PATH}:/app/vault
    environment:
      - DB_URL_VECTORDB=${DB_URL_VECTORDB:-postgresql+psycopg://ai:ai@db:5432/ai}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}

volumes:
  postgres_data:
  ollama_data:
